    <meta charset="utf-8">                                              <!--NEW-->
    
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" href="data:,">

    <!-- CSS
    –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <link rel="stylesheet" href="https://weelch.de/skeleton/css/weelch_v0.css">

<style>
    input { margin: 0; }
</style>



<body onload="Display.onload()" style="background-image: url('../game/img/bg_ship.jpg');background-repeat: no-repeat;background-size: cover;background-position: center top;">
<!-- NAVIGATION
–––––––––––––––––––––––––––––––––––––––––––––––––– -->
<div class="container static">

    <div class="row">
        <div id="tabMeta" class="column three box tab purple" onclick="Display.openTab(this)">
            <h1> 
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon lucide lucide-file-code-icon lucide-file-code"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 12.5 8 15l2 2.5"/><path d="m14 12.5 2 2.5-2 2.5"/></svg>
            </h1>
        </div>
        <div id="tabEdit" class="column six box tab green" onclick="Display.openTab(this)">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon lucide lucide-file-pen-icon lucide-file-pen"><path d="M12.659 22H18a2 2 0 0 0 2-2V8a2.4 2.4 0 0 0-.706-1.706l-3.588-3.588A2.4 2.4 0 0 0 14 2H6a2 2 0 0 0-2 2v9.34"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10.378 12.622a1 1 0 0 1 3 3.003L8.36 20.637a2 2 0 0 1-.854.506l-2.867.837a.5.5 0 0 1-.62-.62l.836-2.869a2 2 0 0 1 .506-.853z"/></svg>
            </h1>
        </div>
        <div id="tabHelp" class="column three box tab blue" onclick="Display.openTab(this)">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon lucide lucide-file-question-mark-icon lucide-file-question-mark"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M12 17h.01"/><path d="M9.1 9a3 3 0 0 1 5.82 1c0 2-3 3-3 3"/></svg>
            </h1>
        </div>
    </div>

</div>
<!-- META
–––––––––––––––––––––––––––––––––––––––––––––––––– -->
<div id="tabMeta_Content" class="container box" style="display: none;">

    <div class="row">
        <div class="column three rtxt">
            Modulname:
        </div>
        <input id="name" class="column nine" type="text">
    </div>
    <div class="row">
        <div class="column three rtxt">
            Autor:
        </div>
        <input id="author" class="column nine" type="text">
    </div>
    <div class="row">
        <div class="column three rtxt">
            Beschreibung:
        </div>
        <textarea id="description" class="column nine"></textarea>
    </div>
    <div class="row smaller nomargin">
        <p class="column nine offset-by-three ctxt">Hier können auch analoge Sonderregeln erklärt werden</p>
    </div>
    <div class="row">
        <div class="column three rtxt">
            ID:
        </div>
        <h5 id="id" class="column six" type="text"></h5>
    </div>
    <div class="row">
        <h1 class="column three offset-by-three box tab orange" onclick="DataManager.saveToJSON()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon lucide lucide-download-icon lucide-download"><path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg>
        </h1>
        <h1 class="column three box tab orange" onclick="DataManager.loadFromJSON()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon lucide lucide-upload-icon lucide-upload"><path d="M12 3v12"/><path d="m17 8-5-5-5 5"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
        </h1>
    </div>

</div>
<!-- EDIT
–––––––––––––––––––––––––––––––––––––––––––––––––– -->
<div id="tabEdit_Content" style="display: none;">

    <div class="container box">

        <!-- EX/IM PLODE
        –––––––––––––––––––––––––––––––––––––––––––––––––– -->
        <div class="row">
            <h1 class="column six box tab orange" onclick="Display.implodeAllEvents()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon lucide lucide-chevrons-up-icon lucide-chevrons-up"><path d="m17 11-5-5-5 5"/><path d="m17 18-5-5-5 5"/></svg>
            </h1>
            <h1 class="column six box tab orange" onclick="Display.explodeAllEvents()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon lucide lucide-chevrons-down-icon lucide-chevrons-down"><path d="m7 6 5 5 5-5"/><path d="m7 13 5 5 5-5"/></svg>
            </h1>
        </div>

    </div>

    <div class="container">

        <!-- ADD BUTTON 
        –––––––––––––––––––––––––––––––––––––––––––––––––– -->
        <div class="row" style="display: none;">
            <h1 class="column six offset-by-three box tab orange" onclick="Display.addEvent(this , false)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon lucide lucide-file-plus-icon lucide-file-plus"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M9 15h6"/><path d="M12 18v-6"/></svg>
            </h1>
        </div>


        <!-- EVENT SPACE
        –––––––––––––––––––––––––––––––––––––––––––––––––– -->


        <!-- ADD BUTTON
        –––––––––––––––––––––––––––––––––––––––––––––––––– -->
        <div class="row">
            <h1 class="column six offset-by-three box tab orange" onclick="Display.addEvent(this , true)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon lucide lucide-file-plus-icon lucide-file-plus"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M9 15h6"/><path d="M12 18v-6"/></svg>
            </h1>
        </div>

    </div>

</div>
<!-- HELP
–––––––––––––––––––––––––––––––––––––––––––––––––– -->
<div id="tabHelp_Content" class="container box" style="display: none;">

    help

</div>




<div id="popup" class="modal"></div>
</body>
